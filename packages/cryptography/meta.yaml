package:
  name: cryptography
  version: 47.0.0
  tag:
    - rust
  top-level:
    - cryptography
source:
  url: https://files.pythonhosted.org/packages/source/c/cryptography/cryptography-47.0.0.tar.gz
  sha256: 9f8e55fe4e63613a5e1cc5819030f27b97742d720203a087802ce4ce9ceb52bb
  patches:
    - patches/0001-Tell-rust-lang-libc-that-time_t-is-64-bits.patch
build:
  vendor-sharedlib: true
  script: |
    export OPENSSL_DIR=$WASM_LIBRARY_DIR
requirements:
  run:
    - six
    - cffi
  host:
    - libopenssl
    - cffi
  executable:
    - rustup
test:
  imports:
    - cryptography
    - cryptography.exceptions
    - cryptography.fernet
    - cryptography.hazmat
    - cryptography.utils
    - cryptography.x509
about:
  home: https://github.com/pyca/cryptography
  PyPI: https://pypi.org/project/cryptography
  summary:
    cryptography is a package which provides cryptographic recipes and primitives
    to Python developers.
  license: BSD-3-Clause OR Apache-2.0
